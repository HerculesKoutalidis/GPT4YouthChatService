version: '3.8'

services:
  # 1. THE LLM ENGINE
  vllm-engine:
    image: vllm/vllm-openai:latest
    env_file:
    - .env
    restart: unless-stopped
    container_name: vllm-engine
    ports:
      - "8005:8005"
    runtime: nvidia
    environment:
      # --- ADD YOUR HF TOKEN HERE ---
      - HF_API_TOKEN=${HF_TOKEN}
      - VLLM_API_KEY=${VLLM_API_KEY}
    volumes:
      # This mounts your host's HF cache so the container doesn't re-download the model
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model meta-llama/Llama-3.2-3B-Instruct
      --dtype auto
      --api-key ${VLLM_API_KEY}
      --port 8005
      --host 0.0.0.0
      --gpu-memory-utilization 0.30
      --max-model-len 32768

  # 2. THE STREAMLIT UI
  streamlit-ui:
    build: .
    restart: unless-stopped
    container_name: streamlit-gptforyouth
    ports:
      - "8505:8505"
    environment:
      - RUNNING_IN_DOCKER=true
      # 172.17.0.1 is usually the host IP in Docker's default bridge network
      - HOST_IP=172.17.0.1
    depends_on:
      - vllm-engine